<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh;
            /* Aquí ponemos la URL de la imagen épica */
            background-image: url('https://googleusercontent.com/image_generation_content/310');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .container { 
            background: rgba(0, 0, 0, 0.7); /* Fondo oscuro semitransparente para que el texto resalte */
            padding: 40px; border-radius: 20px; 
            border: 4px solid #ffffff;
            text-align: center; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-width: 450px;
        }
        h1 { color: #ffffff; font-size: 2.5em; margin: 0 0 10px 0; text-shadow: 2px 2px #cc0000; }
        p { color: #dddddd; font-size: 1.2em; margin-bottom: 25px; }
        .btn { 
            display: inline-block; padding: 15px 30px; 
            background: #cc0000; color: white; 
            text-decoration: none; font-weight: bold; 
            border-radius: 5px; border: 2px solid white;
            transition: 0.3s;
        }
        .btn:hover { background: #ff0000; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>LoPokeMasturbas</h1>
        <p>¿Estás listo para el desafío?</p>
        <a class="btn" href="https://github.com/codespaces/new?hide_repo_select=true&ref=main&repo=binup30/LPM">ENCENDER SERVIDOR</a>
    </div>
</body>
</html>
